          <h2>CareTrack: Offline Gecko and Reptile Care Tracker with Reminders</h2>
          <p>
            CareTrack is an offline-first reptile and gecko care tracker that helps keepers
            record feeding schedules, supplement routines, shedding events, and behavior observations.
            Whether you care for leopard geckos, crested geckos, ball pythons, tarantulas, or frogs,
            you can keep daily husbandry records consistent and accessible without internet access.
          </p>
          <p>
            Reliable records make it easier to review trends over time. When appetite changes,
            supplementation drifts, or shedding quality declines, dated logs help you evaluate what
            changed and when. This improves daily care decisions and supports clearer communication
            with qualified professionals when needed.
          </p>
          <p>Trusted by 500+ keepers.</p>

          <h2>Core Benefits</h2>
          <ul>
            <li>Offline care logs for feeding, supplementation, shedding, and health observations.</li>
            <li>Reminder workflows that reduce missed tasks in daily husbandry routines.</li>
            <li>Species-specific learning resources for geckos, snakes, amphibians, and tarantulas.</li>
            <li>Structured records that support long-term pattern review and planning.</li>
          </ul>

          <h2>Popular Use Cases</h2>
          <ul>
            <li>Leopard gecko feeding schedule tracking and supplement cadence checks.</li>
            <li>Crested gecko routine logging for feeding response and behavior notes.</li>
            <li>Ball python husbandry review with dated feeding and shedding entries.</li>
            <li>Breeder-oriented recordkeeping for pairings, routines, and follow-up observations.</li>
          </ul>
