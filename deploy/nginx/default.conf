server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  absolute_redirect off;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  location = /playground {
    return 301 /playground/gecko;
  }

  location = /playground/ {
    return 301 /playground/gecko;
  }

  # Canonicalize index documents to clean URLs.
  location = /index.html {
    return 301 /$is_args$args;
  }

  location ~ ^/(.+)/index\.html$ {
    return 301 /$1$is_args$args;
  }

  # Canonicalize trailing slash variants (except root and explicit routes above).
  location ~ ^/(.+)/+$ {
    return 301 /$1$is_args$args;
  }

  location / {
    try_files $uri $uri/index.html $uri/ =404;
  }

  location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|woff|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
