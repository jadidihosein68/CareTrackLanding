services:
  caretrack-landing:
    container_name: caretrack-landing
    image: caretrack-landing:latest
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CARETRACK_LOCAL_BIND_PORT:-18084}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
